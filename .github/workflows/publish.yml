name: Publish

# Publishes to npm when a v* tag is pushed, with build provenance so the npm
# page links back to the exact repo, commit and workflow run that produced the
# tarball.
#
# Authentication uses npm trusted publishing (OIDC) — there is no NPM_TOKEN.
# This requires a one-time setup on npmjs.com: package settings -> Trusted
# Publisher -> GitHub Actions, pointing at this repo and this workflow file.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    # Must match the environment configured on the npm trusted publisher.
    environment: release
    permissions:
      contents: write # required to create the GitHub release
      id-token: write # required for provenance and trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm 11.5.1+, and Node 22 ships npm 10. Pinned
      # to the 11 major rather than @latest: npm 12 requires Node >=22.22, so
      # @latest silently breaks whenever npm's floor moves past our runtime.
      - name: Update npm
        run: npm install -g npm@^11

      - name: Install dependencies
        run: npm ci

      # Catches a tag that disagrees with the version being published, which
      # would otherwise ship silently under the wrong number.
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG"
            exit 1
          fi
          echo "Publishing $PKG"

      - name: Test
        run: npm test

      - name: Publish
        run: npm publish --provenance --access public

      # Runs only after a successful publish, so a release never advertises a
      # version that is not actually on npm. --generate-notes appends the
      # commits since the previous tag to the install snippet below.
      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="https://www.npmjs.com/package/@showtrak/server-sdk/v/${VERSION}"

          # Written to a file rather than passed inline so the markdown is not
          # sensitive to this block's indentation.
          cat > /tmp/notes.md <<EOF
          Published to npm as [\`@showtrak/server-sdk@${VERSION}\`](${PKG}), with build provenance.

          \`\`\`bash
          npm install @showtrak/server-sdk
          \`\`\`
          EOF

          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --generate-notes \
            --notes-file /tmp/notes.md
